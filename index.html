<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonial Collection Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#2f2f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.form-container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    position:relative;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.close-btn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:28px;
    color:#999;
    cursor:pointer;
}

h1{
    font-size:20px;
    margin-bottom:20px;
}

.logo{
    width:70px;
    height:70px;
    border-radius:12px;
    margin-bottom:20px;
    object-fit:cover;
}

h2{
    font-size:18px;
    margin-bottom:10px;
}

.line{
    width:50px;
    height:4px;
    background:#4c5cff;
    border-radius:10px;
    margin-bottom:15px;
}

.question{
    color:#777;
    margin-bottom:20px;
    line-height:1.5;
}

.star{
    font-size:35px;
    color:#ccc;
    cursor:pointer;
    transition:0.2s;
}

.star:hover{
    transform:scale(1.1);
}

textarea,
input{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:20px;
    font-size:16px;
}

textarea{
    height:150px;
    resize:none;
}

label{
    display:block;
    margin-bottom:8px;
}

.cta-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#000,#444);
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.cta-btn:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

.status-message{
    margin-top:15px;
    text-align:center;
    font-size:14px;
}
</style>
</head>
<body>

<div class="form-container">

    <div class="close-btn">&times;</div>

    <h1>Drop a review</h1>

    <img src="logo.png.jpg" class="logo" alt="Logo">

    <h2>Question</h2>
    <div class="line"></div>

    <p class="question">• How did our staff treat you during your session?</p>

    <form id="reviewForm">

        <div class="rating-box">
            <span class="star" onclick="rate(1)">★</span>
            <span class="star" onclick="rate(2)">★</span>
            <span class="star" onclick="rate(3)">★</span>
            <span class="star" onclick="rate(4)">★</span>
            <span class="star" onclick="rate(5)">★</span>
            <input type="hidden" id="rating" name="rating">
        </div>

        <textarea name="message" placeholder="Write your testimonial..." required></textarea>

        <label>Date of Visit</label>
        <input type="date" name="date_of_visit" required>

        <label>Your Name *</label>
        <input type="text" name="name" required>

        <label>Your Email *</label>
        <input type="email" name="email" required>

        <button type="submit" class="cta-btn" id="submitBtn">
            Send Review
        </button>

        <div class="status-message" id="statusMessage"></div>

    </form>

</div>

<script>
const form = document.getElementById("reviewForm");
const submitBtn = document.getElementById("submitBtn");
const statusMessage = document.getElementById("statusMessage");

// Star rating
function rate(stars){
    const allStars = document.querySelectorAll(".star");
    document.getElementById("rating").value = stars;

    allStars.forEach((star,index)=>{
        star.style.color = index < stars ? "gold" : "#ccc";
    });
}

// Close button
document.querySelector(".close-btn").addEventListener("click", ()=>{
    document.querySelector(".form-container").style.display = "none";
});

// Form submit
form.addEventListener("submit", async function(e){
    e.preventDefault();

    const rating = document.getElementById("rating").value;

    if(!rating){
        statusMessage.style.color = "red";
        statusMessage.innerText = "Please select a star rating.";
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";
    statusMessage.innerText = "";

    const formData = new FormData(form);

    try{
        const response = await fetch("https://formspree.io/f/xojoaogd", {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            }
        });

        if(response.ok){
            statusMessage.style.color = "green";
            statusMessage.innerText = "Review submitted successfully!";

            form.reset();

            document.querySelectorAll(".star").forEach(star=>{
                star.style.color = "#ccc";
            });

            // Redirect after 2 seconds
            setTimeout(()=>{
                window.location.href = "thank-you.html";
            }, 2000);

        } else {
            statusMessage.style.color = "red";
            statusMessage.innerText = "Something went wrong. Please try again.";
        }

    } catch(error){
        statusMessage.style.color = "red";
        statusMessage.innerText = "Network error. Please check your connection.";
    }

    submitBtn.disabled = false;
    submitBtn.innerText = "Send Review";
});
</script>

</body>
</html>
